<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>填写出行需求</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="card">
    <h2 id="questionTitle">你从哪里出发？</h2>

    <!-- 输入区域 -->
    <div id="inputArea"></div>

    <!-- 按钮 -->
    <div class="actions">
      <button onclick="nextStep()">下一步</button>
    </div>

    <!-- 进度 -->
    <p id="progress" style="text-align:center; margin-top:10px; color:#888;"></p>
  </div>

</div>

<script>

let step = 0;
let answers = {};

const steps = [
  {
    key: "city",
    title: "你从哪里出发？",
    type: "input"
  },
  {
    key: "destination",
    title: "想去哪里？（可以先随便填）",
    type: "input"
  },
  {
    key: "days",
    title: "打算玩几天？",
    type: "number"
  },
  {
    key: "pace",
    title: "你更喜欢哪种节奏？",
    type: "select",
    options: ["慢慢玩", "适中", "紧凑一点"]
  },
  {
    key: "budget",
    title: "大概预算是多少？",
    type: "select",
    options: ["1000–2000", "2000–4000", "4000以上"]
  },
  {
    key: "personality",
    title: "你平时性格更偏向？",
    type: "select",
    options: ["安静", "一般", "外向"]
  },
  {
    key: "companion",
    title: "这次是否考虑找同行？",
    type: "select",
    options: ["是", "否"]
  }
];

function renderStep() {
  const current = steps[step];

  document.getElementById("questionTitle").innerText = current.title;
  document.getElementById("progress").innerText =
    `第 ${step + 1} / ${steps.length} 步`;

  let html = "";

  if (current.type === "input") {
    html = `<input id="answer" type="text" />`;
  }

  if (current.type === "number") {
    html = `<input id="answer" type="number" />`;
  }

  if (current.type === "select") {
    html = `<select id="answer">`;
    current.options.forEach(opt => {
      html += `<option value="${opt}">${opt}</option>`;
    });
    html += `</select>`;
  }

  document.getElementById("inputArea").innerHTML = html;
}

function nextStep() {
  const value = document.getElementById("answer").value;

  if (!value) {
    alert("请先填写这一项");
    return;
  }

  answers[steps[step].key] = value;

  step++;

  if (step >= steps.length) {
    finish();
    return;
  }

  renderStep();
}

function finish() {
  localStorage.setItem("travelData", JSON.stringify(answers));
  window.location.href = "result.html";
}

// 初始化
renderStep();

</script>

</body>
</html>
