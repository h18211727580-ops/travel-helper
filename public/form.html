<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>填写出行需求</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-page">

  <div class="form-header">
    <h1>填写你的出行想法</h1>
    <p>一步一步来，很快就好</p>
  </div>

  <div class="form-card">

    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>

    <h2 id="questionTitle"></h2>

    <div id="inputArea"></div>

    <div class="form-actions">
      <button onclick="nextStep()">下一步</button>
    </div>

    <p class="step-info" id="progressText"></p>

  </div>

</div>

<script>
let step = 0;
let answers = {};

const steps = [
  { key: "city", title: "你从哪里出发？", type: "input" },
  { key: "destination", title: "想去哪里？", type: "input" },
  { key: "days", title: "玩几天？", type: "number" },
  { key: "pace", title: "节奏？", type: "select", options: ["慢慢玩", "适中", "紧凑"] },
  { key: "budget", title: "预算？", type: "select", options: ["1000-2000", "2000-4000", "4000+"] },
  { key: "companion", title: "考虑找同行吗？", type: "select", options: ["是", "否"] }
];

function renderStep() {
  const s = steps[step];

  document.getElementById("questionTitle").innerText = s.title;
  document.getElementById("progressText").innerText = `第 ${step+1}/${steps.length} 步`;
  document.getElementById("progressFill").style.width = ((step+1)/steps.length*100)+"%";

  let html = "";

  if (s.type === "input") {
    html = `<input id="answer">`;
  }

  if (s.type === "number") {
    html = `<input id="answer" type="number">`;
  }

  if (s.type === "select") {
    html = `<div class="option-group">`;
    s.options.forEach(opt=>{
      html += `<div class="option-item" onclick="selectOption('${opt}')">${opt}</div>`;
    });
    html += `</div>`;
  }

  document.getElementById("inputArea").innerHTML = html;
}

function selectOption(v){
  answers[steps[step].key]=v;

  document.querySelectorAll(".option-item").forEach(el=>{
    el.classList.remove("active");
    if(el.innerText===v) el.classList.add("active");
  });
}

function nextStep(){
  let s = steps[step];
  let v = answers[s.key];

  if(s.type==="input" || s.type==="number"){
    v = document.getElementById("answer").value;
  }

  if(!v){
    alert("请填写");
    return;
  }

  answers[s.key]=v;
  step++;

  if(step>=steps.length){
    localStorage.setItem("travelData",JSON.stringify(answers));
    window.location.href="result.html";
    return;
  }

  renderStep();
}

renderStep();
</script>

</body>
</html>
