<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的出行建议</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="loadResult()">

<div class="page-shell">

  <!-- 顶部 -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">旅</div>
      <div>
        <div class="brand-name">安心结伴出行助手</div>
        <div class="brand-sub">为你生成的出行建议</div>
      </div>
    </div>
  </header>

  <main class="container result-page">

    <!-- 顶部说明 -->
    <section class="result-hero-pro">
      <div class="result-hero-left">
        <span class="hero-badge">分析完成</span>
        <h1>这是更适合你的出行方案</h1>
        <p class="hero-desc">
          根据你填写的信息，我们整理了一份更容易落地的旅行建议。
        </p>
      </div>

      <div class="result-hero-right">
        <div class="hero-stat-card">
          <div class="hero-stat-label">当前状态</div>
          <div class="hero-stat-value">已生成建议</div>
        </div>

        <div class="hero-stat-card">
          <div class="hero-stat-label">下一步</div>
          <div class="hero-stat-value">可以联系 / 重新填写</div>
        </div>
      </div>
    </section>

    <!-- 主体 -->
    <section class="result-layout">

      <!-- 左侧 -->
      <div class="result-main-column">

        <!-- AI路线 -->
        <div class="result-panel result-panel-highlight">
          <div class="panel-head">
            <h2>AI 推荐路线</h2>
            <span class="result-tag">AI生成</span>
          </div>

          <div id="routes" class="ai-route-pro">
            正在生成路线，请稍等...
          </div>
        </div>

      </div>

      <!-- 右侧 -->
      <aside class="result-side-column">

        <div class="result-panel">
          <div class="panel-head">
            <h2>操作</h2>
          </div>

          <div class="action-stack">
            <button class="btn btn-primary" onclick="contact()">联系组织者</button>
            <button class="btn btn-secondary" onclick="back()">重新填写</button>
          </div>

          <p class="helper-note">
            后续可以接微信、群聊或人工服务。
          </p>
        </div>

      </aside>

    </section>

  </main>

</div>

<script src="script.js"></script>

<script>
function back() {
  window.location.href = "form.html";
}

function contact() {
  alert("这里可以接入微信或联系方式");
}
</script>

</body>
</html>
